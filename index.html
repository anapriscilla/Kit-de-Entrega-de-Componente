<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kit por Ana Priscilla F.</title>
    <link rel="stylesheet" href="src/styles/index.css" />
  </head>
  <body>
    <div class="page">
      <section class="showcase-card">
        <div class="showcase-header">
          <h1 class="showcase-title">Kit de entrega de componentes</h1>
          <p class="showcase-subtitle">Composto por label, field, checkbox, link e button</p>
        </div>

        <form novalidate>
          <div class="stack--fields">
            <div class="field" data-field="username">
              <label class="label label--default" for="username">Usuário</label>
              <div class="field-content field-content--default">
                <svg class="icon" viewBox="0 0 16 16" aria-hidden="true">
                  <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3" fill="none" />
                  <path d="M3 14c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" />
                </svg>
                <input id="username" name="username" type="text" class="field-input" placeholder="seu.usuario" required />
              </div>
              <p class="field-helper-text" hidden>Usuário inválido</p>
            </div>

            <div class="field" data-field="password">
              <label class="label label--default" for="password">Senha</label>
              <div class="field-content field-content--default">
                <svg class="icon" viewBox="0 0 16 16" aria-hidden="true">
                  <rect x="3.5" y="7" width="9" height="6.5" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none" />
                  <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" />
                </svg>
                <input id="password" name="password" type="password" class="field-input" placeholder="••••••••" required />
                <button type="button" class="field-trailing" data-toggle-password aria-label="Mostrar senha">
                  <svg class="icon icon-eye" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M1.5 8S4 3.5 8 3.5 14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round" />
                    <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3" fill="none" />
                  </svg>
                  <svg class="icon icon-eye-slash" viewBox="0 0 16 16" aria-hidden="true" hidden>
                    <path d="M1.5 8S4 3.5 8 3.5 14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round" />
                    <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3" fill="none" />
                    <path d="M2.5 13.5 13.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                  </svg>
                </button>
              </div>
              <p class="field-helper-text" hidden>Senha incorreta</p>
            </div>
          </div>

          <div class="row row--between">
            <label class="checkbox">
              <input id="remember" type="checkbox" class="checkbox-native" />
              <span class="checkbox-box">
                <svg class="checkbox-mark" viewBox="0 0 10 10" aria-hidden="true">
                  <path d="M1.5 5.2 4 7.7 8.5 2.3" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </span>
              <span class="label label--default">Lembrar-me</span>
            </label>
            <a href="#" class="link"><span class="label label--default">Esqueceu a senha?</span></a>
          </div>

          <button type="submit" class="button button--default">ENTRAR</button>
        </form>
      </section>
    </div>

    <script src="src/app.js" defer></script>
  </body>
</html>
